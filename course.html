<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Course Player | SeekhoWithRua LMS</title>
  <meta name="description" content="Watch course videos and track your learning progress on SeekhoWithRua LMS.">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/lms.css">
</head>
<body>
  <div class="particles" id="particles"></div>

  <header>
    <div class="logo">SeekhoWith<span>Rua LMS</span></div>
    <nav>
      <a href="index.html">Courses</a>
      <a href="my-learning.html">My Learning</a>
      <a href="trainer-dashboard.html">Trainer Portal</a>
      <a href="https://app.seekhowithrua.com" target="_blank">Live Rooms</a>
    </nav>
  </header>

  <main class="course-player">
    <div class="player-container">
      <div class="video-section">
        <div class="video-wrapper">
          <div id="youtubePlayer"></div>
          <div class="video-placeholder" id="videoPlaceholder">
            <div class="placeholder-content">
              <div class="play-icon">▶️</div>
              <p>Select a video from the sidebar to start learning</p>
            </div>
          </div>
        </div>
        <div class="video-info">
          <h1 id="videoTitle">Course Title</h1>
          <div class="video-meta">
            <span id="videoDuration">Duration: --</span>
            <span id="videoModule">Module: --</span>
          </div>
          <p id="videoDescription">Select a video to see its description.</p>
          <div class="video-actions">
            <button class="btn-complete" id="markCompleteBtn" onclick="toggleVideoComplete()">
              <span class="btn-icon">✓</span>
              <span id="completeBtnText">Mark as Complete</span>
            </button>
            <button class="btn-prev" id="prevBtn" onclick="loadPreviousVideo()">← Previous</button>
            <button class="btn-next" id="nextBtn" onclick="loadNextVideo()">Next →</button>
          </div>
        </div>
      </div>

      <aside class="course-sidebar">
        <div class="course-header">
          <h2 id="courseTitle">Course Title</h2>
          <div class="course-progress">
            <div class="progress-bar">
              <div class="progress-fill" id="courseProgressBar" style="width: 0%"></div>
            </div>
            <span id="courseProgressText">0% Complete</span>
          </div>
        </div>
        <div class="video-list" id="videoList"></div>
      </aside>
    </div>
  </main>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script src="js/lms.js"></script>
  <script>
    // ─── AUTHENTICATION CHECK ───
    // Check if user is logged in before allowing course access
    const currentUser = JSON.parse(localStorage.getItem('cosmos_user') || 'null');
    const authToken = localStorage.getItem('cosmos_auth_token');
    
    if (!currentUser || !authToken) {
      // User not logged in - redirect to enroll page with return URL
      const currentUrl = encodeURIComponent(window.location.href);
      window.location.href = `enroll.html?redirect=${currentUrl}`;
    }

    let player;
    let currentCourse = null;
    let currentVideoIndex = 0;

    function onYouTubeIframeAPIReady() {
      loadCourseFromURL();
    }

    function loadCourseFromURL() {
      const urlParams = new URLSearchParams(window.location.search);
      const courseId = urlParams.get('course');
      const videoIndex = parseInt(urlParams.get('video')) || 0;

      if (!courseId) {
        window.location.href = 'index.html';
        return;
      }

      const courses = getCourses();
      currentCourse = courses.find(c => c.id === courseId);

      if (!currentCourse) {
        window.location.href = 'index.html';
        return;
      }

      document.getElementById('courseTitle').textContent = currentCourse.title;
      renderVideoList();
      loadVideo(videoIndex);
    }

    function renderVideoList() {
      const list = document.getElementById('videoList');
      const progress = getCourseProgress(currentCourse.id);

      list.innerHTML = currentCourse.videos.map((video, index) => {
        const isCompleted = progress.completedVideos.includes(index);
        return `
          <div class="video-item ${isCompleted ? 'completed' : ''} ${index === currentVideoIndex ? 'active' : ''}" onclick="loadVideo(${index})">
            <div class="video-number">${index + 1}</div>
            <div class="video-details">
              <h4>${video.title}</h4>
              <span class="video-duration">${video.duration}</span>
            </div>
            <div class="video-status">${isCompleted ? '✓' : '○'}</div>
          </div>
        `;
      }).join('');

      updateCourseProgress();
    }

    function loadVideo(index) {
      currentVideoIndex = index;
      const video = currentCourse.videos[index];

      document.getElementById('videoTitle').textContent = video.title;
      document.getElementById('videoDuration').textContent = `Duration: ${video.duration}`;
      document.getElementById('videoModule').textContent = `Module: ${video.module || 'General'}`;
      document.getElementById('videoDescription').textContent = video.description || 'No description available.';

      const placeholder = document.getElementById('videoPlaceholder');
      if (placeholder) placeholder.style.display = 'none';

      if (player) {
        player.loadVideoById(extractVideoId(video.youtubeUrl));
      } else {
        player = new YT.Player('youtubePlayer', {
          height: '100%',
          width: '100%',
          videoId: extractVideoId(video.youtubeUrl),
          playerVars: {
            playsinline: 1,
            rel: 0,
            modestbranding: 1
          },
          events: {
            onStateChange: onPlayerStateChange
          }
        });
      }

      updateUI();
      updateURL();
    }

    function onPlayerStateChange(event) {
      if (event.data === YT.PlayerState.ENDED) {
        markVideoComplete(currentVideoIndex);
      }
    }

    function toggleVideoComplete() {
      const progress = getCourseProgress(currentCourse.id);
      const isCompleted = progress.completedVideos.includes(currentVideoIndex);

      if (isCompleted) {
        unmarkVideoComplete(currentVideoIndex);
      } else {
        markVideoComplete(currentVideoIndex);
      }
    }

    function markVideoComplete(index) {
      const progress = getCourseProgress(currentCourse.id);
      if (!progress.completedVideos.includes(index)) {
        progress.completedVideos.push(index);
        saveCourseProgress(currentCourse.id, progress);
        renderVideoList();
        updateUI();
        showNotification('Video marked as complete!');
      }
    }

    function unmarkVideoComplete(index) {
      const progress = getCourseProgress(currentCourse.id);
      progress.completedVideos = progress.completedVideos.filter(i => i !== index);
      saveCourseProgress(currentCourse.id, progress);
      renderVideoList();
      updateUI();
    }

    function updateUI() {
      const progress = getCourseProgress(currentCourse.id);
      const isCompleted = progress.completedVideos.includes(currentVideoIndex);

      document.getElementById('markCompleteBtn').className = isCompleted ? 'btn-complete completed' : 'btn-complete';
      document.getElementById('completeBtnText').textContent = isCompleted ? 'Completed ✓' : 'Mark as Complete';

      document.getElementById('prevBtn').disabled = currentVideoIndex === 0;
      document.getElementById('nextBtn').disabled = currentVideoIndex === currentCourse.videos.length - 1;

      document.querySelectorAll('.video-item').forEach((item, index) => {
        item.classList.toggle('active', index === currentVideoIndex);
      });
    }

    function updateCourseProgress() {
      const progress = getCourseProgress(currentCourse.id);
      const percentage = Math.round((progress.completedVideos.length / currentCourse.videos.length) * 100);

      document.getElementById('courseProgressBar').style.width = `${percentage}%`;
      document.getElementById('courseProgressText').textContent = `${percentage}% Complete`;
    }

    function loadPreviousVideo() {
      if (currentVideoIndex > 0) {
        loadVideo(currentVideoIndex - 1);
      }
    }

    function loadNextVideo() {
      if (currentVideoIndex < currentCourse.videos.length - 1) {
        loadVideo(currentVideoIndex + 1);
      }
    }

    function updateURL() {
      const url = new URL(window.location);
      url.searchParams.set('video', currentVideoIndex);
      window.history.replaceState({}, '', url);
    }

    function extractVideoId(url) {
      const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
      const match = url.match(regExp);
      return (match && match[2].length === 11) ? match[2] : null;
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft' && !document.getElementById('prevBtn').disabled) {
        loadPreviousVideo();
      } else if (e.key === 'ArrowRight' && !document.getElementById('nextBtn').disabled) {
        loadNextVideo();
      }
    });
  </script>
</body>
</html>

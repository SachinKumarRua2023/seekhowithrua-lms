<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enroll Now | SeekhoWithRua LMS</title>
  <meta name="description" content="Enroll in courses at SeekhoWithRua. Secure payment with Razorpay.">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/lms.css">
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <style>
    .enrollment-page {
      position: relative;
      z-index: 5;
      padding: 40px;
      max-width: 1200px;
      margin: 0 auto;
      min-height: 100vh;
    }

    .enrollment-header {
      text-align: center;
      margin-bottom: 50px;
    }

    .enrollment-header h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 36px;
      margin-bottom: 15px;
    }

    .enrollment-header p {
      color: var(--text-secondary);
      font-size: 16px;
    }

    .enrollment-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: start;
    }

    /* Course Summary Card */
    .course-summary {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      position: sticky;
      top: 100px;
    }

    .course-summary-header {
      padding: 30px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      text-align: center;
    }

    .course-summary-icon {
      font-size: 64px;
      margin-bottom: 15px;
    }

    .course-summary-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .course-summary-category {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 2px;
      opacity: 0.9;
    }

    .course-summary-body {
      padding: 30px;
    }

    .course-features {
      list-style: none;
      margin-bottom: 30px;
    }

    .course-features li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
      color: var(--text-secondary);
    }

    .course-features li:last-child {
      border-bottom: none;
    }

    .feature-icon {
      width: 24px;
      height: 24px;
      background: rgba(124, 58, 237, 0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
    }

    .price-section {
      background: rgba(124, 58, 237, 0.1);
      border-radius: 12px;
      padding: 25px;
      text-align: center;
    }

    .price-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-secondary);
      margin-bottom: 10px;
    }

    .price-value {
      font-family: 'Orbitron', sans-serif;
      font-size: 42px;
      font-weight: 700;
      color: var(--primary-light);
    }

    .price-original {
      font-size: 18px;
      text-decoration: line-through;
      color: var(--text-muted);
      margin-left: 10px;
    }

    /* Payment Form */
    .payment-section {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px;
    }

    .payment-section h2 {
      font-size: 22px;
      margin-bottom: 10px;
    }

    .payment-section > p {
      color: var(--text-secondary);
      font-size: 14px;
      margin-bottom: 30px;
    }

    .form-group {
      margin-bottom: 25px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-secondary);
    }

    .form-group input {
      width: 100%;
      padding: 14px 18px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 15px;
      transition: var(--transition);
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--primary);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .secure-badge {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(46, 204, 113, 0.1);
      border: 1px solid rgba(46, 204, 113, 0.3);
      border-radius: 8px;
      padding: 15px 20px;
      margin-bottom: 25px;
      font-size: 13px;
    }

    .secure-badge svg {
      width: 20px;
      height: 20px;
      color: var(--success);
    }

    .btn-pay {
      width: 100%;
      padding: 18px 30px;
      background: linear-gradient(135deg, var(--primary), #9333ea);
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn-pay:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(124, 58, 237, 0.4);
    }

    .btn-pay:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .payment-methods {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-top: 25px;
    }

    .payment-method {
      width: 50px;
      height: 35px;
      background: rgba(255,255,255,0.1);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    /* Loading State */
    .loading-spinner {
      display: none;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* No Course Selected */
    .no-course {
      text-align: center;
      padding: 100px 20px;
    }

    .no-course-icon {
      font-size: 64px;
      margin-bottom: 20px;
    }

    .no-course h2 {
      font-size: 24px;
      margin-bottom: 15px;
    }

    .no-course p {
      color: var(--text-secondary);
      margin-bottom: 30px;
    }

    @media (max-width: 1024px) {
      .enrollment-container {
        grid-template-columns: 1fr;
      }

      .course-summary {
        position: static;
      }
    }

    @media (max-width: 768px) {
      .form-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="particles" id="particles"></div>

  <header>
    <div class="logo">SeekhoWith<span>Rua LMS</span></div>
    <nav>
      <a href="index.html">Courses</a>
      <a href="my-learning.html">My Learning</a>
      <a href="https://app.seekhowithrua.com" target="_blank">Live Rooms</a>
    </nav>
  </header>

  <main class="enrollment-page" id="enrollmentPage">
    <!-- Content will be loaded dynamically -->
  </main>

  <footer>
    <div class="footer-content">
      <div class="footer-brand">
        <div class="logo">SeekhoWith<span>Rua</span></div>
        <p>Making quality education accessible through AI and community.</p>
      </div>
      <div class="footer-links">
        <div class="footer-column">
          <h4>Learn</h4>
          <a href="index.html">All Courses</a>
          <a href="my-learning.html">My Learning</a>
        </div>
        <div class="footer-column">
          <h4>Platform</h4>
          <a href="https://seekhowithrua.com">Main Site</a>
          <a href="https://app.seekhowithrua.com">Live Rooms</a>
          <a href="https://gaming.seekhowithrua.com">Gaming Lab</a>
        </div>
      </div>
    </div>
    <div class="footer-bottom">
      <p>&copy; 2026 SeekhoWithRua. Secure payments powered by Razorpay.</p>
    </div>
  </footer>

  <script src="js/cosmos-auth.js"></script>
  <script src="js/lms.js"></script>
  <script>
    // ─── VISUAL LOCK OVERLAY ───
    function showLockOverlay(message, redirectUrl) {
      const overlay = document.createElement('div');
      overlay.id = 'authLockOverlay';
      overlay.innerHTML = `
        <div style="
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          background: rgba(4, 4, 15, 0.95);
          backdrop-filter: blur(10px);
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          z-index: 9999;
          font-family: 'Orbitron', sans-serif;
        ">
          <div style="
            width: 120px;
            height: 120px;
            border: 3px solid #7c3aed;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            margin-bottom: 30px;
            animation: pulse 2s infinite;
          ">🔒</div>
          <h2 style="
            color: #fff;
            font-size: 28px;
            margin-bottom: 15px;
            text-align: center;
          ">${message}</h2>
          <p style="
            color: rgba(255,255,255,0.6);
            font-size: 14px;
            margin-bottom: 30px;
            text-align: center;
            max-width: 400px;
          ">Please log in to enroll in courses</p>
          <a href="${redirectUrl}" style="
            padding: 15px 40px;
            background: linear-gradient(135deg, #7c3aed, #00d4ff);
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 16px;
            transition: transform 0.2s;
          " onmouseover="this.style.transform='translateY(-2px)'" onmouseout="this.style.transform='translateY(0)'">
            🔐 Login to Enroll
          </a>
        </div>
        <style>
          @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(124, 58, 237, 0.4); }
            50% { box-shadow: 0 0 0 20px rgba(124, 58, 237, 0); }
          }
        </style>
      `;
      document.body.appendChild(overlay);
    }

    // ─── AUTHENTICATION CHECK ───
    // Initialize COSMOS auth system first
    COSMOS_AUTH.init();
    
    // Get parameters from URL
    const urlParams = new URLSearchParams(window.location.search);
    const directCourseId = urlParams.get('course');
    const redirectUrl = urlParams.get('redirect');
    const paymentStatus = urlParams.get('payment');
    
    // Try to extract course ID from redirect URL if present
    let courseId = directCourseId;
    let returnUrl = redirectUrl;
    
    if (!courseId && redirectUrl) {
      try {
        const decodedRedirect = decodeURIComponent(redirectUrl);
        const redirectParams = new URLSearchParams(new URL(decodedRedirect).search);
        courseId = redirectParams.get('course');
      } catch (e) {
        console.error('Failed to parse redirect URL:', e);
      }
    }

    // Load Razorpay Key from config
    const RAZORPAY_KEY_ID = 'rzp_test_SYNmgL82IxXJu6';

    // Check auth after brief delay to allow URL token processing
    function checkAuthAndLoad() {
      const currentUser = COSMOS_AUTH.getUser();
      const authToken = COSMOS_AUTH.getToken();
      
      // Only show lock if no valid session exists
      if (!currentUser || !authToken) {
        const currentUrl = encodeURIComponent(window.location.href);
        const loginUrl = `https://app.seekhowithrua.com/login?redirect=${currentUrl}`;
        showLockOverlay('Enrollment Locked', loginUrl);
        return false;
      }
      return true;
    }

    document.addEventListener('DOMContentLoaded', () => {
      // Small delay to ensure COSMOS_AUTH has processed URL tokens
      setTimeout(() => {
        // Check if user just completed payment and login
        if (paymentStatus === 'success' && redirectUrl) {
          const currentUser = COSMOS_AUTH.getUser();
          const authToken = COSMOS_AUTH.getToken();
          
          if (currentUser && authToken) {
            // User just completed payment and login, redirect to original course
            window.location.href = decodeURIComponent(redirectUrl);
            return;
          }
        }
        
        if (checkAuthAndLoad()) {
          if (courseId) {
            loadEnrollmentPage(courseId);
          } else {
            showNoCourseSelected();
          }
        }
      }, 100);
    });

    function loadEnrollmentPage(courseId) {
      const courses = getCourses();
      const course = courses.find(c => c.id === courseId);

      if (!course) {
        showNoCourseSelected();
        return;
      }

      const container = document.getElementById('enrollmentPage');
      const originalPrice = Math.round(course.price * 1.5); // 50% discount show

      container.innerHTML = `
        <div class="enrollment-header">
          <h1>Complete Your Enrollment</h1>
          <p>Join thousands of students learning with SeekhoWithRua</p>
        </div>

        <div class="enrollment-container">
          <!-- Course Summary -->
          <div class="course-summary">
            <div class="course-summary-header">
              <div class="course-summary-icon">${course.icon}</div>
              <div class="course-summary-title">${course.title}</div>
              <div class="course-summary-category">${course.category}</div>
            </div>
            <div class="course-summary-body">
              <ul class="course-features">
                <li>
                  <span class="feature-icon">✓</span>
                  <span>${course.videos?.length || 0}+ Video Lessons</span>
                </li>
                <li>
                  <span class="feature-icon">✓</span>
                  <span>Lifetime Access</span>
                </li>
                <li>
                  <span class="feature-icon">✓</span>
                  <span>Certificate of Completion</span>
                </li>
                <li>
                  <span class="feature-icon">✓</span>
                  <span>Gaming Lab Access</span>
                </li>
                <li>
                  <span class="feature-icon">✓</span>
                  <span>Animation Lab Access</span>
                </li>
                <li>
                  <span class="feature-icon">✓</span>
                  <span>24/7 Community Support</span>
                </li>
              </ul>
              <div class="price-section">
                <div class="price-label">Total Amount</div>
                <div class="price-value">
                  ₹${course.price}
                  ${course.price < originalPrice ? `<span class="price-original">₹${originalPrice}</span>` : ''}
                </div>
              </div>
            </div>
          </div>

          <!-- Payment Form -->
          <div class="payment-section">
            <h2>Payment Details</h2>
            <p>Enter your details to proceed with secure payment</p>

            <div class="secure-badge">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
              </svg>
              <span>256-bit SSL Encrypted & Secure Payment</span>
            </div>

            <form id="paymentForm" onsubmit="handlePayment(event, '${course.id}', ${course.price})">
              <div class="form-group">
                <label for="studentName">Full Name *</label>
                <input type="text" id="studentName" placeholder="Enter your full name" required>
              </div>

              <div class="form-group">
                <label for="studentEmail">Email Address *</label>
                <input type="email" id="studentEmail" placeholder="you@example.com" required>
              </div>

              <div class="form-row">
                <div class="form-group">
                  <label for="studentPhone">Phone Number *</label>
                  <input type="tel" id="studentPhone" placeholder="+91 98765 43210" required>
                </div>
                <div class="form-group">
                  <label for="studentCity">City</label>
                  <input type="text" id="studentCity" placeholder="Your city">
                </div>
              </div>

              <button type="submit" class="btn-pay" id="payButton">
                <span class="loading-spinner" id="paySpinner"></span>
                <span id="payText">Pay ₹${course.price}</span>
              </button>
            </form>

            <div class="payment-methods">
              <div class="payment-method">💳</div>
              <div class="payment-method">UPI</div>
              <div class="payment-method">🏦</div>
              <div class="payment-method">📱</div>
            </div>
          </div>
        </div>
      `;
    }

    function showNoCourseSelected() {
      document.getElementById('enrollmentPage').innerHTML = `
        <div class="no-course">
          <div class="no-course-icon">📚</div>
          <h2>No Course Selected</h2>
          <p>Please select a course from our catalog to enroll</p>
          <a href="index.html" class="btn-primary">Browse Courses</a>
        </div>
      `;
    }

    async function handlePayment(event, courseId, amount) {
      event.preventDefault();

      const name = document.getElementById('studentName').value;
      const email = document.getElementById('studentEmail').value;
      const phone = document.getElementById('studentPhone').value;
      const button = document.getElementById('payButton');
      const spinner = document.getElementById('paySpinner');
      const payText = document.getElementById('payText');

      // Show loading
      button.disabled = true;
      spinner.style.display = 'block';
      payText.textContent = 'Processing...';

      try {
        // Create order on backend (simulated here)
        const orderId = await createOrder(courseId, amount);

        // Razorpay Checkout Options
        const options = {
          key: RAZORPAY_KEY_ID,
          amount: amount * 100, // Amount in paise
          currency: 'INR',
          name: 'SeekhoWithRua',
          description: 'Course Enrollment',
          order_id: orderId,
          handler: function(response) {
            // Payment successful
            verifyAndEnroll(response, courseId, {
              name, email, phone,
              courseId,
              amount,
              paymentId: response.razorpay_payment_id,
              orderId: response.razorpay_order_id
            });
          },
          prefill: {
            name: name,
            email: email,
            contact: phone
          },
          theme: {
            color: '#7c3aed'
          },
          modal: {
            ondismiss: function() {
              // Reset button when modal closed
              button.disabled = false;
              spinner.style.display = 'none';
              payText.textContent = `Pay ₹${amount}`;
            }
          }
        };

        const rzp = new Razorpay(options);
        rzp.open();

      } catch (error) {
        console.error('Payment error:', error);
        showNotification('Payment failed. Please try again.');
        button.disabled = false;
        spinner.style.display = 'none';
        payText.textContent = `Pay ₹${amount}`;
      }
    }

    // Simulate creating order on backend
    async function createOrder(courseId, amount) {
      // In production, this makes API call to your backend
      // Backend creates order using Razorpay API with your SECRET KEY
      return new Promise((resolve) => {
        setTimeout(() => {
          // Generate mock order ID
          const orderId = 'order_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
          resolve(orderId);
        }, 500);
      });
    }

    // Verify payment and enroll student
    function verifyAndEnroll(paymentResponse, courseId, studentData) {
      // Store enrollment locally
      const enrollments = JSON.parse(localStorage.getItem('lms_enrollments') || '[]');
      enrollments.push({
        ...studentData,
        enrolledAt: new Date().toISOString(),
        status: 'active'
      });
      localStorage.setItem('lms_enrollments', JSON.stringify(enrollments));

      // Mark course as enrolled
      const enrolled = JSON.parse(localStorage.getItem('lms_enrolled') || '[]');
      if (!enrolled.includes(courseId)) {
        enrolled.push(courseId);
        localStorage.setItem('lms_enrolled', JSON.stringify(enrolled));
      }
      
      // Store enrolled student data for trainer notifications
      const enrolledStudents = JSON.parse(localStorage.getItem('lms_enrolled_students') || '[]');
      enrolledStudents.push({
        id: 'student_' + Date.now(),
        name: studentData.name,
        email: studentData.email,
        course: courseId,
        paymentId: paymentResponse.razorpay_payment_id,
        enrolledAt: new Date().toISOString()
      });
      localStorage.setItem('lms_enrolled_students', JSON.stringify(enrolledStudents));

      // Redirect to success page with redirect URL if present
      let successUrl = `payment-success.html?course=${courseId}&payment=${paymentResponse.razorpay_payment_id}&email=${encodeURIComponent(studentData.email)}`;
      if (returnUrl) {
        successUrl += `&redirect=${encodeURIComponent(returnUrl)}`;
      }
      window.location.href = successUrl;
    }
  </script>
</body>
</html>
